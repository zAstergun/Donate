<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5e6"/>
      <stop offset="100%" stop-color="#f0edd8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="roundRect">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundRect)">
    <!-- Beige background (light mode) -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle ambient glow -->
    <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

    <!-- Four-pointed star ✦ — aster-dark black -->
    <path d="M256 56 L296 216 L456 256 L296 296 L256 456 L216 296 L56 256 L216 216 Z" fill="#1a1a2e"/>

    <!-- Subtle border -->
    <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="#1a1a2e" stroke-opacity="0.06" stroke-width="2"/>
  </g>
</svg>
